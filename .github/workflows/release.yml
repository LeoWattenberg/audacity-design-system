name: Release @dilsonspickles/components

# Trigger a publish to GitHub Packages whenever a tag of the form
# `components-v*` is pushed (e.g. `components-v0.1.0`). Using a prefixed
# tag keeps room for other packages to gain their own release flows later
# without ambiguity.
on:
  push:
    tags:
      - 'components-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run pnpm publish with --dry-run (no actual publish)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      # Configure Node to talk to GitHub Packages for the @dilsonspickles
      # scope. NODE_AUTH_TOKEN gets read from secrets.GITHUB_TOKEN below.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dilsonspickles'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all workspace packages
        run: pnpm --filter './packages/*' -r build

      - name: Sanity-check built artifacts
        run: |
          test -f packages/components/dist/index.mjs
          test -f packages/components/dist/index.js
          test -f packages/components/dist/index.d.ts
          test -f packages/components/dist/index.css
          ls packages/components/dist/*.ttf

      # Catches the class of bug where a hook throws when used outside its
      # provider — exactly what slipped through before 0.2.0. Runs against
      # the freshly built ./dist so we're testing what consumers actually
      # see, not the source.
      - name: Standalone-mode smoke test (in-package)
        run: pnpm --filter @dilsonspickles/components test:smoke

      # Build the tiny static-smoke Vite app. It imports the priority
      # surfaces with no providers — if a bundler / build-time regression
      # creeps in (missing CSS export, broken tree-shake, etc.) it fails
      # here before publish.
      - name: Build standalone smoke page
        run: pnpm --filter @dilsonspickles/static-smoke build

      # Stronger check: pack the tarball, install it into a fresh project
      # with React 18 (lowest supported peer) and re-run the smoke test
      # against the installed copy. Catches peer-dep mismatches, missing
      # `files` entries in the publish manifest, etc.
      - name: Tarball-install smoke test (React 18)
        run: |
          set -euo pipefail
          cd packages/components
          npm pack
          TARBALL="$(ls dilsonspickles-components-*.tgz | head -1)"
          echo "Built tarball: $TARBALL"
          # Use the absolute path before we leave the directory.
          TARBALL_PATH="$(pwd)/$TARBALL"
          SCRIPT_PATH="$(pwd)/scripts/smoke-test.mjs"
          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          cat > package.json <<EOF
          { "name": "external-smoke-test", "private": true, "type": "module" }
          EOF
          npm install --no-audit --no-fund react@18 react-dom@18 "$TARBALL_PATH"
          # Resolve the installed entry point and hand it to the script.
          INSTALLED_ENTRY="$(node -e "console.log(require.resolve('@dilsonspickles/components'))")"
          echo "Installed entry: $INSTALLED_ENTRY"
          SMOKE_TARGET="$INSTALLED_ENTRY" node "$SCRIPT_PATH"

      - name: Publish @dilsonspickles/components
        working-directory: packages/components
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "Dry run — not publishing"
            pnpm publish --dry-run --no-git-checks
          else
            pnpm publish --no-git-checks
          fi
